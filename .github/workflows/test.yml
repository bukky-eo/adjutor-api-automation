name: Adjutor API Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: npm ci || npm install
    
    - name: Create .env file
      run: |
        echo "API_KEY=${{ secrets.API_KEY }}" >> .env
        echo "BASE_URL=${{ secrets.BASE_URL || 'https://adjutor.lendsqr.com/v2/' }}" >> .env
    
    - name: Run tests
      run: npm test
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL || 'https://adjutor.lendsqr.com/v2/' }}
        CI: true
    
    - name: Run tests with coverage
      run: npm run coverage
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL || 'https://adjutor.lendsqr.com/v2/' }}
        CI: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: |
          coverage/
          test-results.json
          junit.xml
        retention-days: 30

  test-windows:
    runs-on: windows-latest
    needs: test
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    
    - name: Install dependencies
      run: npm ci || npm install
    
    - name: Create .env file
      run: |
        echo "API_KEY=${{ secrets.API_KEY }}" >> .env
        echo "BASE_URL=${{ secrets.BASE_URL || 'https://adjutor.lendsqr.com/v2/' }}" >> .env
      shell: bash
    
    - name: Run tests on Windows
      run: npm test
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL }}
        CI: true
    
    - name: Upload Windows results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-windows
        path: coverage/
        retention-days: 30

  report:
    runs-on: ubuntu-latest
    needs: [test, test-windows]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all results
      uses: actions/download-artifact@v4
      with:
        path: all-results
    
    - name: Create summary
      run: |
        echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "Ubuntu 18.x: Completed" >> $GITHUB_STEP_SUMMARY
        echo "Ubuntu 20.x: Completed" >> $GITHUB_STEP_SUMMARY  
        echo "Windows: Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY