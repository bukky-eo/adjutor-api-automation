name: Adjutor API Automation Tests

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main ]
  schedule:
    # I set it to run daily at 7 AM
    - cron: '0 7 * * *'
  workflow_dispatch:
   

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint code
      run: npm run lint || true
    
    - name: Run smoke tests
      run: npm run test:smoke
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL }}
        NODE_ENV: test
    
    - name: Run full regression tests
      run: npm run test:regression
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL }}
        NODE_ENV: test
      continue-on-error: true
    
    - name: Run tests with coverage
      run: npm run coverage
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL }}
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: |
          test-results/
          coverage/
          test-report.html
        retention-days: 30
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-windows:
    runs-on: windows-latest
    needs: test
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests on Windows
      run: npm test
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL }}
    
    - name: Upload Windows test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-windows
        path: test-results/
        retention-days: 30

  report:
    runs-on: ubuntu-latest
    needs: [test, test-windows]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: all-test-results
    
    - name: Generate consolidated report
      run: |
        npm run test:report
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "Tests completed for all environments" >> $GITHUB_STEP_SUMMARY
        echo "Coverage reports generated" >> $GITHUB_STEP_SUMMARY
        echo "Artifacts available for download" >> $GITHUB_STEP_SUMMARY
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./test-results
        destination_dir: test-reports
        keep_files: true